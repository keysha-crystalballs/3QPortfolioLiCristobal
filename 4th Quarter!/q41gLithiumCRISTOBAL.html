<!DOCTYPE html>
<html>
    <head>
        <style>
            body {
                background-color: #f0f4ff;
                margin: 0;
                padding: 0;
            }

            h1 {
                font-family: Verdana, Geneva, Tahoma, sans-serif;
                font-size: 35px;
                text-align: center;
                color: #000000;
            }

            label, p {
                font-family: Verdana, Geneva, Tahoma, sans-serif;
                font-weight: bold;
                color: #333;
            }

            form {
                max-width: 500px;
                margin: 30px auto;
                padding: 30px;
                background-color: white;
                border-radius: 12px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            }

            input[type="text"], input[type="number"], select {
                width: 100%;
                padding: 10px;
                border: 1px solid #ccc;
                border-radius: 6px;
                box-sizing: border-box;
            }

            button[type="submit"] {
                width: 100%;
                background-color: #1a73e8;
                color: white;
                padding: 14px;
                border: none;
                border-radius: 6px;
                font-size: 16px;
                cursor: pointer;
                margin-top: 10px;
            }

            button[type="submit"]:hover {
                background-color: #1558b0;
            }

            label[for^="star"] {
                font-size: 30px;
                color: #ccc;
                cursor: pointer;
            }

            input[type="radio"]:checked ~ label {
                color: gold;
            }

            input[type="radio"] {
                display: none;
            }

            .stars {
                display: flex;
                flex-direction: row-reverse;
                justify-content: flex-end;
            }

            #movieList {
                max-width: 500px;
                margin: auto;
                padding: 20px 30px;
            }

            .movie-item {
                border: 1px solid #ddd;
                border-radius: 8px;
                padding: 12px 16px;
                margin-bottom: 10px;
                background-color: white;
                box-shadow: 0 2px 6px rgba(0,0,0,0.07);
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-family: Verdana, Geneva, Tahoma, sans-serif;
            }

            .movie-item button {
                background-color: #e84141;
                color: white;
                border: none;
                border-radius: 6px;
                padding: 6px 12px;
                cursor: pointer;
                font-size: 13px;
            }

            .movie-item button:hover {
                background-color: #c0392b;
            }
        </style>

        <script> 
            function addMovie() {
                var title = document.getElementById("title").value;
                var year = document.getElementById("year").value;
                var genre = document.getElementById("movieGenre").value;
                var ratingInput = document.querySelector('input[name="rating"]:checked');
                if (ratingInput) {
                    var rating = parseInt(ratingInput.value);
                } 
                else {
                    var rating = 0;
                }

                var movies = JSON.parse(localStorage.getItem("movies")) || [];

                let existingMovie = movies.find(movie => movie.title === title);

                if (existingMovie) {
                    existingMovie.rating = Math.round((parseInt(existingMovie.rating) + rating) / 2);
                } 
                else {
                    movies.push({ title, year, genre, rating });
                }
                localStorage.setItem("movies", JSON.stringify(movies));
                displayMovies();
            }

            function displayMovies() {
                document.getElementById("movieList").innerHTML = "";
                var movies = JSON.parse(localStorage.getItem("movies")) || [];
                for (let i = 0; i < movies.length; i++) {
                    var movie = movies[i];
                    var item = document.createElement("div");
                    item.className = "movie-item";
                    item.innerHTML = movie.title + " (" + movie.year + ") - " + movie.genre + ", Rating: " + "<span style='color: gold;'>" + "★".repeat(movie.rating) + "</span>";
                    var deleteButton = document.createElement("button");
                    deleteButton.innerHTML = "Delete";
                    deleteButton.onclick = function() {
                        if (confirm("Are you sure you want to delete?")) {
                            movies.splice(i, 1);
                            localStorage.setItem("movies", JSON.stringify(movies));
                            displayMovies();
                        }
                    }
                    item.appendChild(deleteButton);
                    document.getElementById("movieList").appendChild(item);
                }
            }
            window.onload = displayMovies;

        </script>
    </head>
        <body>
            <h1> Add a Movie</h1>
            <form  id="login" onsubmit="addMovie(); return false;">

                <label for="title"> Title: </label>
                <input type="text" id="title" name="title" required><br><br>

                <label for="year"> Year: </label>
                <input type="number" id="year" name="year" required><br><br>
                
                <p> Genre: </p>
                <select name="movieGenre" id="movieGenre" required>
                    <option value="select"> Select </option>
                    <option value="action"> Action </option>
                    <option value="comedy"> Comedy </option>
                    <option value="romance"> Romance </option>
                    <option value="drama"> Drama </option>
                    <option value="horror"> Horror </option>
                    <option value="mystery"> Mystery </option>
                </select>

                <br><br>

                <p> Rating: </p>

                <div class="stars">
                <input type="radio" name="rating" value="5" id="star5">
                <label for="star5">★</label>
                <input type="radio" name="rating" value="4" id="star4">
                <label for="star4">★</label>
                <input type="radio" name="rating" value="3" id="star3">
                <label for="star3">★</label>
                <input type="radio" name="rating" value="2" id="star2">
                <label for="star2">★</label>
                <input type="radio" name="rating" value="1" id="star1">
                <label for="star1">★</label>
                </div>

                <br><br>

                <button type="submit">Add Movie</button>
            </form>
            <h1> Movie Lists: </h1>
            <div id="movieList"></div>
        </body>
</html>
